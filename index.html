<!DOCTYPE html>
<html>
  <head>
    <title>TITLE</title>
    <meta charset="utf-8" />
    <style>
      * {
        text-align: center;
      }
      body {
        margin-top: 180px;
      }
      a {
        color: dimgrey;
        text-decoration: none;
      }
      h1 {
        font-size: 100px;
        margin-bottom: -5px;
        color: rgb(60, 134, 196);
        font-family: fantasy;
      }
      input {
        border: none;
        border-bottom: 2px solid rgb(60, 134, 196);
        font-size: 17px;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande",
          "Lucida Sans", Arial, sans-serif;
        text-align: left;
      }
      input:focus {
        outline: none;
      }
      #submit {
        background-color: rgb(60, 134, 196);
        color: white;
        border: none;
        border-radius: 12px;
        width: 104px;
        height: 24px;
        margin-top: 25px;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande",
          "Lucida Sans", Arial, sans-serif;
      }
      form {
        margin-top: 60px;
      }
      #pwd {
        margin-top: 10px;
      }
    </style>
  </head>

  <body>
    <div>
      <h1>HOME</h1>
      <nav>
        <strong style="text-decoration: underline">HOME</strong>
        <a href="./menu1.html">TEXT 1</a>
        <a href="./menu2.html">TEXT 2</a>
        <a href="./menu3.html">TEXT 3</a>
      </nav>
    </div>

    <form>
      <input
        id="id_txt"
        type="text"
        name="id"
        placeholder="ID"
        maxlength="41"
      />
      <br />
      <input
        id="pwd"
        type="password"
        name="pwd"
        placeholder="PASSWORD"
        maxlength="41"
      />
      <br />
      <button id="submit" type="submit" name="submit">
        <span>log-in</span>
      </button>
    </form>
  </body>
</html>
