<!DOCTYPE html>
<html>
  <head>
    <title>TITLE</title>
    <meta charset="utf-8" />
    <style>
      * {
        text-align: center;
      }
      body {
        margin: 0;
        padding: 80px;
      }
      a {
        color: dimgrey;
        text-decoration: none;
      }
      nav {
        margin-bottom: 45px;
      }
      h1 {
        font-size: 100px;
        margin-bottom: -5px;
        color: rgb(60, 134, 196);
        font-family: fantasy;
      }
      input {
        height: 30px;
        border: none;
        border-bottom: 2px solid rgb(60, 134, 196);
        border-radius: 0px;
        color: dimgrey;
        font-size: 17px;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande",
          "Lucida Sans", Arial, sans-serif;
        text-align: left;
      }
      input:focus {
        outline: none;
        background-color: rgb(205, 239, 255);
        /*포커스 디자인 조금 더 고려해보기*/
      }
      button {
        background-color: white;
        color: rgb(60, 134, 196);
        border: 2px solid rgb(60, 134, 196);
        border-radius: 12px;
        width: 100px;
        height: 23px;
        font-family: "Trebuchet MS", "Lucida Sans Unicode", "Lucida Grande",
          "Lucida Sans", Arial, sans-serif;
        padding-top: 0px;
      }
      button:hover {
        background-color: rgb(60, 134, 196);
        color: white;
      }
      #pwd {
        margin-top: 10px;
        margin-bottom: 25px;
      }
    </style>
  </head>

  <body>
    <div>
      <h1>HOME</h1>
      <nav>
        <strong style="text-decoration: underline">HOME</strong>
        <!--홈 주소 연결하기-->
        <a href="./menu1.html">TEXT 1</a>
        <a href="./menu2.html">TEXT 2</a>
        <a href="./menu3.html">TEXT 3</a>
      </nav>
    </div>

    <form>
      <input
        id="id_txt"
        type="text"
        name="id"
        placeholder="ID"
        maxlength="41"
      />
      <br />
      <input
        id="pwd"
        type="password"
        name="pwd"
        placeholder="PASSWORD"
        maxlength="41"
      />
      <br />
      <button id="signup" type="button" name="signup" onclick="location.href='./sign-up.html'">
        <span>sign-up</span>
      </button>
      <button id="submit" type="submit" name="submit">
        <span>log-in</span>
      </button>
    </form>
  </body>
</html>
